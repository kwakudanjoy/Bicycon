<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <title>Home</title>
</head>
<body>
    <div id="loading-overlay" class="hidden">
        <div class="loader-circle"></div>
    </div>
    <header>
        <div class="page-signature">
            <div><i class="fa-solid fa-bicycle"></i></div>
            <p>Bicycon</p>
        </div>
        <div class="account-signature" id="auth">
            <div class="user"><i class="fa-solid fa-user"></i></div>
            <div class="profile"><img src="" alt="img"></div>
        </div>
    </header>
    
    <nav>
        <div class="key-search">
            
        </div>
        <div class="search-bar">
            <input class="search-input" type="text" name="" id="" placeholder="search.........">
            <div class="search-icon"><i class="fa-solid fa-search"></i></div>
        </div>
    </nav>
    <div class="cart-overlay">

        <div class="cart-modal">

            <!-- CLOSE BUTTON (optional but useful) -->
            <button class="cart-close-btn">&times;</button>

            <!-- PRODUCT SECTION -->
            <div class="cart-product">

                <img src="/image/photo-1555617766-c94804975da3.avif" 
                    alt="Product Image" 
                    class="cart-product__image">

                <div class="cart-product__details">
                    <p class="cart-product__name">Iphone 12pro</p>
                    <p class="cart-product__price">GHC 50</p>
                    <p class="cart-product__description">
                        KDSKDJKDSJDKSDJKDSJDKS,;SDPWWEWE;WOPWO';LD;SKODOJWEWEHUWHJHHYSDYGSDBSHDSDGS
                    </p>
                </div>

            </div>

            <!-- RETAILER INFO -->
            <div class="cart-retailer">

                <img src="/image/photo-1555617766-c94804975da3.avif" 
                    alt="Retailer Image" 
                    class="cart-retailer__image">

                <div class="cart-retailer__info">
                    <p class="cart-retailer__name">Cryptorn</p>
                    <p class="cart-retailer__email">kwakudanjoy12@gmail.com</p>
                    <p class="cart-retailer__phone">0203544784</p>
                </div>

            </div>

            <!-- ORDER CONTROLS -->
            <div class="cart-actions">

                <div class="cart-quantity">
                    <button class="qty-btn minus">−</button>
                    <span class="qty-number">1</span>
                    <button class="qty-btn plus">+</button>
                </div>

                <button class="cart-buy-btn">
                    <i class="fa-solid fa-shopping-cart"></i> Buy
                </button>

            </div>

            <!-- CUSTOMER INFO -->
            <div class="cart-customer">
                <!-- future inputs -->
            </div>

        </div>

    </div>
   <main class="main">

        
    <!-- Repeat product-card as needed -->
    </main>
    <script type="module" src="index.js"></script>
</body>
</html>
